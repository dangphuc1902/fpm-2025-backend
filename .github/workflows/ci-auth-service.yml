name: "CI/CD - User Auth Service"

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'Backend/user-auth-service/**'
      - 'libs/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'Backend/user-auth-service/**'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Shared Libraries
        run: |
          cd libs
          mvn clean install -DskipTests -B

      - name: Build Service JAR
        run: |
          cd Backend/user-auth-service
          mvn clean package -B

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./Backend/user-auth-service
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/fpm-auth-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/fpm-auth-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/fpm-auth-service:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
