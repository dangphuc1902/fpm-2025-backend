name: "CI/CD - User Auth Service"

on:
  push:
    branches: [ main, develop, master ]
    paths:
      - 'user-auth-service/**'
  pull_request:
    branches: [ main, develop, master ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          # Quan trọng: Cấu hình server-id để khớp với <id>github</id> trong pom.xml
          server-id: github
          cache: 'maven'

      - name: Build Service JAR
        run: |
          cd user-auth-service
          # Dùng -s settings.xml (được tự động tạo bởi setup-java)
          mvn clean package -B
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./user-auth-service
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/fpm-auth-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/fpm-auth-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/fpm-auth-service:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

